<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="promptifyTitle promptifyDesc">
  <title id="promptifyTitle">Promptify mark</title>
  <desc id="promptifyDesc">Promptify brand mark with a warm vertical bar and blue accent orb.</desc>
  <defs>
    <linearGradient id="promptifyBg" x1="10%" x2="90%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35" />
      <stop offset="55%" stop-color="#ff8a48" />
      <stop offset="100%" stop-color="#ffb84d" />
    </linearGradient>
    <linearGradient id="promptifyStem" x1="50%" x2="50%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
    <radialGradient id="promptifyOrb" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="36" fill="url(#promptifyBg)" />
  <rect x="20" y="20" width="88" height="88" rx="28" fill="#ffffff" fill-opacity="0.92" />
  <rect x="46" y="34" width="14" height="52" rx="999" fill="url(#promptifyStem)" />
  <circle cx="76" cy="60" r="17" fill="url(#promptifyOrb)" stroke="#ffffff" stroke-opacity="0.96" stroke-width="8" />
</svg>
